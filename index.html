<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Synth Collective</title>
    <!-- Tailwind via CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&display=swap" rel="stylesheet">
    <!-- Modular CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div id="hud">
        <h1 class="text-2xl font-bold text-blue-400">Synth Collective</h1>
        <p class="text-sm text-gray-300 mt-1">Current Level: <span id="level-indicator" class="font-bold text-white">World</span></p>
        <p class="text-xs text-gray-400 mt-3">Scroll to Zoom in/out<br>Click & Drag to Pan<br><strong>Magnetic Snap Enabled</strong></p>
    </div>

    <div id="watermark">The Synth Collective</div>

    <div id="viewport" data-level="world">
        <!-- The map content is now dynamically generated by js/main.js -->
        <div id="map"></div>
    </div>

    <!-- Modular JS Entry Point -->
    <script type="module" src="js/main.js"></script>
</body>
</html>
